spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/intelliflow
    username: ${DB_USESRNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  upload-dir: uploads

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4o-mini
